<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content=" Ataeymir Altınyıldız Aperatif Dükkanı — Tost, Döner, Kokoreç ve daha fazlası" />
  <meta name="theme-color" content="#0f0f0f" />

  <!-- Open Graph -->
  <meta property="og:title" content="Altınyıldız Aperatif — Menü" />
  <meta property="og:description" content="Taze lezzetler, uygun fiyatlar. QR ile anında görüntüle." />
  <meta property="og:type" content="website" />

  <title>Aperatif Dükkanı 🔥 Menü</title>

  <!-- Google Fonts (preconnect önce) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Stil -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ================================================
       HEADER
       ================================================ -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-logo" aria-hidden="true">🌶️</div>
        <div class="brand-text">
          <h1>Altınyıldız Aperatif</h1>
          <span class="tagline">Bahçeden Sofraya • %100 Organik </span>
        </div>
      </div>

      <div class="header-actions">
        <button
          id="themeToggle"
          class="btn-icon"
          aria-label="Temayı değiştir / Toggle theme"
          title="Tema"
        >☀️</button>
      </div>
    </div>
  </header>

  <!-- ================================================
       HERO
       ================================================ -->
  <section class="hero" aria-label="Karşılama">
    <div class="hero-emoji" aria-hidden="true">🔥</div>
    <h2>Lezzetin Durağı Altınyıldız</h2>
    <p>Hasret Kaldığın O Tat</p>
    <div class="hero-badge" aria-label="Bugün açık">
      <span aria-hidden="true">🟢</span>
      <span>Haftanın Her Günü · 7 Days Active</span>
    </div>
  </section>

  <!-- ================================================
       GÜNÜN MENÜSÜ
       ================================================ -->
  <section class="daily-special" aria-label="Günün menüsü" id="dailySpecial">
    <!-- JS ile doldurulacak -->
  </section>

  <!-- ================================================
       KATEGORİ SEKME ÇUBUĞU
       ================================================ -->
  <nav class="category-nav" aria-label="Menü kategorileri">
    <div class="category-scroll" id="categoryScroll" role="tablist">
      <!-- JS ile doldurulacak -->
    </div>
  </nav>

  <!-- ================================================
       MENÜ KARTLARI
       ================================================ -->
  <main class="menu-main" id="menuMain" role="main">
    <div id="menuContainer" aria-live="polite" aria-label="Menü ürünleri">
      <!-- JS ile doldurulacak -->
    </div>
  </main>

  <!-- ================================================
       WHATSAPP FAB BUTONU
       ================================================ -->
  <a
    id="whatsappFab"
    class="whatsapp-fab"
    href="https://wa.me/905356836028?text=Merhaba%2C+sipari%C5%9F+vermek+istiyorum."
    target="_blank"
    rel="noopener noreferrer"
    aria-label="WhatsApp ile sipariş ver"
  >
    <!-- WhatsApp SVG ikonu -->
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
      <path d="M16.003 2.667C8.64 2.667 2.667 8.64 2.667 16c0 2.347.62 4.573 1.707 6.507L2.667 29.333l6.987-1.68A13.28 13.28 0 0016.003 29.333c7.36 0 13.33-5.973 13.33-13.333S23.363 2.667 16.003 2.667zm0 24c-2.12 0-4.107-.573-5.813-1.573l-.413-.24-4.147 1 1.013-3.987-.267-.427A10.613 10.613 0 015.333 16c0-5.88 4.787-10.667 10.667-10.667 5.88 0 10.667 4.787 10.667 10.667S21.88 26.667 16 26.667zm5.84-8.013c-.32-.16-1.893-.933-2.187-1.04-.293-.107-.507-.16-.72.16-.213.32-.827 1.04-1.013 1.253-.187.213-.373.24-.693.08-.32-.16-1.347-.493-2.56-1.573-.947-.84-1.587-1.88-1.773-2.2-.187-.32-.02-.493.14-.653.147-.14.32-.373.48-.56.16-.187.213-.32.32-.533.107-.213.053-.4-.027-.56-.08-.16-.72-1.733-.987-2.373-.26-.627-.52-.54-.72-.547h-.613c-.213 0-.56.08-.853.4-.293.32-1.12 1.093-1.12 2.667s1.147 3.093 1.307 3.307c.16.213 2.253 3.44 5.467 4.827.763.333 1.36.533 1.827.68.767.24 1.467.207 2.02.127.613-.093 1.893-.773 2.16-1.52.267-.747.267-1.387.187-1.52-.08-.133-.293-.213-.613-.373z"/>
    </svg>
    <!-- Metin JS tarafından ekleniyor -->
  </a>

  <!-- ================================================
       FOOTER
       ================================================ -->
  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <div class="footer-logo">Aperatif Dükkanı</div>
      <div class="footer-info">
        <span>
          <span aria-hidden="true">📍</span>
          <span id="footerLocation"></span>
        </span>
        <span>
          <span aria-hidden="true">🕙</span>
          <span id="footerHours"></span>
        </span>
      </div>
      <p class="footer-copy" id="footerCopy"></p>
    </div>
  </footer>

  <!-- Uygulama scripti -->
  <script src="app.js"></script>
</body>
</html>
